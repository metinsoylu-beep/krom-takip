<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-title" content="Ödeme Takip"/>
  <meta name="theme-color" content="#0f172a"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="apple-touch-icon" href="/icon-192.png"/>
  <title>Arlinoks – Ödeme Takip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #0c1220;
      font-family: Georgia, serif;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 0;
    }

    /* ── NAVİGASYON ── */
    .navbar {
      background: #0f1e35;
      border-bottom: 2px solid #c9a84c;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .arlinoks { font-size: 20px; font-weight: bold; color: #ffffff; letter-spacing: 3px; font-style: italic; }
    .navbar-sag { display: flex; align-items: center; gap: 16px; }
    .firma-duzenle { display: flex; align-items: center; gap: 6px; }
    #firma-adi-goster { color: #c9a84c; font-size: 14px; font-weight: bold; cursor: pointer; border-bottom: 1px dashed #c9a84c55; }
    .firma-input { background: #0f172a; border: 1px solid #c9a84c; color: #f1f5f9; border-radius: 6px; padding: 4px 10px; font-size: 13px; outline: none; font-family: Georgia, serif; width: 130px; display: none; }
    .btn-kaydet-firma { background: #c9a84c; color: #0f172a; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; display: none; }
    .baslik-kucuk { color: #64748b; font-size: 10px; letter-spacing: 2px; }

    /* ── ANA KONTEYNER ── */
    .konteyner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 28px 120px;
    }

    /* ── ÖZET KARTLAR ── */
    .ozet-kartlar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .ozet-kart {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px 20px;
      border-left: 4px solid #334155;
    }
    .ozet-kart.toplam { border-left-color: #c9a84c; }
    .ozet-kart.odenen { border-left-color: #4ade80; }
    .ozet-kart.kalan  { border-left-color: #ef4444; }
    .ozet-etiket { font-size: 11px; color: #64748b; letter-spacing: 1px; margin-bottom: 6px; }
    .ozet-deger { font-size: 20px; font-weight: bold; }
    .ozet-kart.toplam .ozet-deger { color: #f1f5f9; }
    .ozet-kart.odenen .ozet-deger { color: #4ade80; }
    .ozet-kart.kalan  .ozet-deger { color: #ef4444; }

    /* ── FORM ── */
    .form-card {
      background: #1e293b;
      border: 1.5px solid #c9a84c55;
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .form-title { color: #c9a84c; font-weight: bold; font-size: 14px; margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: 2fr 2fr 2fr 1fr; gap: 14px; align-items: end; }
    .form-alan label { color: #94a3b8; font-size: 11px; display: block; margin-bottom: 5px; letter-spacing: 0.5px; }
    .hint { color: #64748b; font-size: 10px; }
    input[type=text], input[type=date], input[type=number] {
      width: 100%; background: #0f172a; border: 1px solid #334155;
      color: #f1f5f9; border-radius: 8px; padding: 10px 12px;
      font-size: 14px; outline: none; font-family: Georgia, serif;
    }
    input:focus { border-color: #c9a84c; }
    #vade-hint { color: #c9a84c; font-size: 11px; margin-top: 4px; display: none; }
    .btn-kaydet {
      width: 100%; background: linear-gradient(135deg, #c9a84c, #a07830);
      color: #0f172a; border: none; border-radius: 8px; padding: 10px;
      font-size: 14px; font-weight: bold; cursor: pointer; font-family: Georgia, serif;
      white-space: nowrap;
    }
    .btn-kaydet:hover { opacity: 0.9; }
    #msg { font-size: 12px; margin-top: 6px; min-height: 16px; color: #4ade80; }

    /* ── TABLO ── */
    .liste-baslik { color: #64748b; font-size: 12px; margin-bottom: 10px; }
    .tablo-wrap { border-radius: 12px; border: 1px solid #1e293b; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { background: #1e3a5f; }
    thead th { padding: 11px 14px; text-align: left; color: #c9a84c; font-size: 10px; letter-spacing: 1px; font-weight: bold; border-bottom: 2px solid #c9a84c44; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #1a2535; transition: background 0.15s; }
    tbody tr:hover { background: #1a2a42; }
    tbody tr.odendi-satir { background: #0d2218 !important; opacity: 0.72; }
    tbody tr.odendi-satir td { text-decoration: line-through; color: #4ade80 !important; }
    td { padding: 11px 14px; vertical-align: middle; }
    .tutar-hucre { color: #c9a84c; font-weight: bold; }
    .durum { display: inline-block; font-size: 11px; font-weight: bold; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
    .islem-grup { display: flex; gap: 6px; }
    .btn-odendi  { font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; border: 1px solid #60a5fa44; background: #1a3a5c; color: #60a5fa; font-family: Georgia, serif; white-space: nowrap; }
    .btn-odendi:hover { background: #1e4a72; }
    .btn-geri-al { font-size: 11px; padding: 5px 12px; border-radius: 6px; cursor: pointer; border: 1px solid #4ade8044; background: #0d2218; color: #4ade80; font-family: Georgia, serif; white-space: nowrap; }
    .btn-sil-tablo { font-size: 11px; padding: 5px 10px; border-radius: 6px; cursor: pointer; border: 1px solid #334155; background: transparent; color: #ef4444; font-family: Georgia, serif; }
    .btn-sil-tablo:hover { background: #2a1212; }
    .bos { text-align: center; color: #475569; padding: 48px 20px; font-size: 15px; line-height: 2.5; }

    /* ── BİLDİRİM BANNER ── */
    #bildirim-banner { display: none; background: #1e293b; border: 1px solid #f59e0b; border-radius: 10px; padding: 12px 18px; margin-bottom: 18px; display: none; align-items: center; justify-content: space-between; gap: 12px; }
    #bildirim-banner.goster { display: flex; }
    .btn-bildirim { background: #f59e0b; color: #0f172a; border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px; font-weight: bold; cursor: pointer; font-family: Georgia, serif; white-space: nowrap; }

    /* ── POP-UP UYARI ── */
    #uyari-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 999;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    #uyari-overlay.aktif { display: flex; }
    #uyari-kutu {
      background: #1e293b;
      border: 2px solid #ef4444;
      border-radius: 16px;
      padding: 30px 32px;
      width: 100%;
      max-width: 560px;
      animation: salla 0.35s ease;
    }
    @keyframes salla { 0%{transform:scale(0.85);opacity:0} 60%{transform:scale(1.03)} 100%{transform:scale(1);opacity:1} }
    .uyari-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    #uyari-ikon { font-size: 36px; }
    #uyari-baslik { color: #ef4444; font-size: 20px; font-weight: bold; }
    #uyari-alt { color: #94a3b8; font-size: 13px; margin-top: 2px; }
    #uyari-liste { margin-bottom: 20px; }
    .uyari-satir {
      background: #0f172a;
      border-left: 4px solid #ef4444;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .uyari-satir .uyari-no { color: #f1f5f9; font-weight: bold; font-size: 14px; }
    .uyari-satir .uyari-tutar { color: #c9a84c; font-weight: bold; font-size: 15px; }
    .uyari-satir .uyari-gun { font-size: 12px; }
    #uyari-kapat {
      background: #ef4444; color: white; border: none;
      border-radius: 10px; padding: 12px; font-size: 14px;
      font-weight: bold; cursor: pointer; width: 100%;
      font-family: Georgia, serif;
    }
    #uyari-kapat:hover { background: #dc2626; }
  </style>
</head>
<body>

  <!-- POP-UP UYARI -->
  <div id="uyari-overlay">
    <div id="uyari-kutu">
      <div class="uyari-header">
        <div id="uyari-ikon">🚨</div>
        <div>
          <div id="uyari-baslik">Ödeme Uyarısı!</div>
          <div id="uyari-alt">Bugün ödenmesi gereken veya gecikmiş faturalar:</div>
        </div>
      </div>
      <div id="uyari-liste"></div>
      <button id="uyari-kapat" onclick="uyariKapat()">✔ Anladım, Kapat</button>
    </div>
  </div>

  <!-- NAVİGASYON -->
  <div class="navbar">
    <div class="arlinoks">Arlinoks</div>
    <div class="navbar-sag">
      <div class="firma-duzenle">
        <span id="firma-adi-goster" onclick="firmaAdiniDuzenle()" title="Düzenlemek için tıklayın"></span>
        <input class="firma-input" id="firma-inp" type="text" placeholder="Firma adı"/>
        <button class="btn-kaydet-firma" id="firma-kaydet-btn" onclick="firmaKaydet()">✓</button>
      </div>
      <div class="baslik-kucuk">90 GÜNLÜK ÖDEME TAKİBİ</div>
    </div>
  </div>

  <div class="konteyner">

    <!-- BİLDİRİM BANNER -->
    <div id="bildirim-banner">
      <span style="color:#f59e0b;font-size:13px;">🔔 Ödeme uyarıları alabilmek için bildirim iznine ihtiyaç var.</span>
      <button class="btn-bildirim" onclick="bildirimIzniIste()">Bildirimlere İzin Ver</button>
    </div>

    <!-- ÖZET KARTLAR -->
    <div class="ozet-kartlar">
      <div class="ozet-kart toplam">
        <div class="ozet-etiket">💰 TOPLAM TUTAR</div>
        <div class="ozet-deger" id="oz-toplam">0 ₺</div>
      </div>
      <div class="ozet-kart odenen">
        <div class="ozet-etiket">✅ ÖDENEN</div>
        <div class="ozet-deger" id="oz-odenen">0 ₺</div>
      </div>
      <div class="ozet-kart kalan">
        <div class="ozet-etiket">🔴 KALAN</div>
        <div class="ozet-deger" id="oz-kalan">0 ₺</div>
      </div>
    </div>

    <!-- FATURA EKLEME FORMU -->
    <div class="form-card">
      <div class="form-title">➕ Yeni Fatura Ekle</div>
      <div class="form-grid">
        <div class="form-alan">
          <label>FATURA NO</label>
          <input type="text" id="inp-no" placeholder="FTR-001"/>
        </div>
        <div class="form-alan">
          <label>FATURA TARİHİ <span class="hint">(90 gün sonrası vade)</span></label>
          <input type="date" id="inp-tarih" oninput="gosterVade()"/>
          <div id="vade-hint"></div>
        </div>
        <div class="form-alan">
          <label>TUTAR (₺)</label>
          <input type="number" id="inp-tutar" placeholder="15.000"/>
        </div>
        <div class="form-alan">
          <label>&nbsp;</label>
          <button class="btn-kaydet" onclick="faturaEkle()">💾 Kaydet</button>
        </div>
      </div>
      <div id="msg"></div>
    </div>

    <!-- LİSTE -->
    <div id="liste-baslik" class="liste-baslik"></div>
    <div id="liste"></div>

  </div>

  <script>
    const ANAHTAR       = "x-firma-odeme-takip";
    const FIRMA_ANAHTAR = "x-firma-adi";

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});

    // ── FİRMA ADI ──
    function firmaAdiniYukle() {
      const ad = localStorage.getItem(FIRMA_ANAHTAR) || "X Firması";
      document.getElementById("firma-adi-goster").textContent = ad + " ✎";
    }
    function firmaAdiniDuzenle() {
      const ad = localStorage.getItem(FIRMA_ANAHTAR) || "X Firması";
      document.getElementById("firma-inp").value = ad;
      document.getElementById("firma-adi-goster").style.display = "none";
      document.getElementById("firma-inp").style.display = "block";
      document.getElementById("firma-kaydet-btn").style.display = "block";
      document.getElementById("firma-inp").focus();
    }
    function firmaKaydet() {
      const ad = document.getElementById("firma-inp").value.trim();
      if (ad) { localStorage.setItem(FIRMA_ANAHTAR, ad); document.getElementById("firma-adi-goster").textContent = ad + " ✎"; }
      document.getElementById("firma-inp").style.display = "none";
      document.getElementById("firma-kaydet-btn").style.display = "none";
      document.getElementById("firma-adi-goster").style.display = "inline";
    }

    // ── VERİ ──
    function faturaYukle() { try { return JSON.parse(localStorage.getItem(ANAHTAR)||"[]"); } catch { return []; } }
    function faturaKaydet(l) { localStorage.setItem(ANAHTAR, JSON.stringify(l)); }
    function vadeTarihi(t) { const d=new Date(t); d.setDate(d.getDate()+90); return d; }
    function formatTarih(d) { return new Date(d).toLocaleDateString("tr-TR",{day:"2-digit",month:"short",year:"numeric"}); }
    function kalanGun(v) { const b=new Date(); b.setHours(0,0,0,0); const vd=new Date(v); vd.setHours(0,0,0,0); return Math.round((vd-b)/86400000); }
    function formatPara(s) { return Number(s).toLocaleString("tr-TR",{minimumFractionDigits:0})+" ₺"; }

    function durumBilgi(g) {
      if(g<0)   return{label:"🔴 "+Math.abs(g)+" gün gecikti",renk:"#ef4444",bg:"#ef444422"};
      if(g===0) return{label:"🟠 Bugün öde!",renk:"#f97316",bg:"#f9731622"};
      if(g<=7)  return{label:"🟡 "+g+" gün kaldı",renk:"#f59e0b",bg:"#f59e0b22"};
      if(g<=30) return{label:"🔵 "+g+" gün kaldı",renk:"#3b82f6",bg:"#3b82f622"};
      return{label:"⚪ "+g+" gün kaldı",renk:"#6b7280",bg:"#6b728022"};
    }

    // ── SES ──
    function uyariSesiCal() {
      try {
        const ctx=new(window.AudioContext||window.webkitAudioContext)();
        [[880,0,0.18],[880,0.22,0.18],[1100,0.44,0.32]].forEach(([f,b,s])=>{
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.connect(g); g.connect(ctx.destination); o.type="sine";
          o.frequency.setValueAtTime(f,ctx.currentTime+b);
          g.gain.setValueAtTime(0.4,ctx.currentTime+b);
          g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+b+s);
          o.start(ctx.currentTime+b); o.stop(ctx.currentTime+b+s);
        });
      } catch(e){}
    }

    // ── ROZET ──
    function rozetGuncelle() {
      const s=faturaYukle().filter(inv=>!inv.odendi&&kalanGun(vadeTarihi(inv.tarih))<=0).length;
      if('setAppBadge' in navigator){ s>0?navigator.setAppBadge(s).catch(()=>{}):navigator.clearAppBadge().catch(()=>{}); }
    }

    // ── ÖZET ──
    function ozetGuncelle() {
      const liste=faturaYukle(); let toplam=0,odenen=0;
      liste.forEach(inv=>{ const t=Number(inv.tutar)||0; toplam+=t; if(inv.odendi) odenen+=t; });
      document.getElementById("oz-toplam").textContent=formatPara(toplam);
      document.getElementById("oz-odenen").textContent=formatPara(odenen);
      document.getElementById("oz-kalan").textContent=formatPara(toplam-odenen);
    }

    // ── POP-UP UYARI ──
    function uyariKontrol() {
      const acil=faturaYukle().filter(inv=>!inv.odendi&&kalanGun(vadeTarihi(inv.tarih))<=0);
      if(!acil.length) return;
      document.getElementById("uyari-liste").innerHTML=acil.map(inv=>{
        const g=kalanGun(vadeTarihi(inv.tarih));
        const gunMetin=g<0
          ?`<span class="uyari-gun" style="color:#ef4444">⚠️ ${Math.abs(g)} gün gecikmiş</span>`
          :`<span class="uyari-gun" style="color:#f97316">⏰ Bugün son gün!</span>`;
        return`<div class="uyari-satir">
          <div>
            <div class="uyari-no">${inv.no}</div>
            ${gunMetin}
          </div>
          <div class="uyari-tutar">${formatPara(inv.tutar)}</div>
        </div>`;
      }).join("");
      document.getElementById("uyari-overlay").classList.add("aktif");
      uyariSesiCal();
    }
    function uyariKapat() { document.getElementById("uyari-overlay").classList.remove("aktif"); }

    // ── BİLDİRİM ──
    function bildirimKontrol() {
      if(!('Notification' in window)) return;
      if(Notification.permission==='default') document.getElementById('bildirim-banner').classList.add('goster');
    }
    function bildirimIzniIste() {
      Notification.requestPermission().then(p=>{
        if(p==='granted'){
          document.getElementById('bildirim-banner').classList.remove('goster');
          new Notification('Arlinoks Ödeme Takip',{body:'Bildirimler aktif! ✅',icon:'/icon-192.png'});
        }
      });
    }

    // ── FORM ──
    function gosterVade() {
      const t=document.getElementById("inp-tarih").value;
      const h=document.getElementById("vade-hint");
      if(t){ h.style.display="block"; h.textContent="→ Vade: "+formatTarih(vadeTarihi(t)); }
      else h.style.display="none";
    }

    function faturaEkle() {
      const no=document.getElementById("inp-no").value.trim();
      const tarih=document.getElementById("inp-tarih").value;
      const tutar=document.getElementById("inp-tutar").value.trim();
      const msg=document.getElementById("msg");
      if(!no||!tarih||!tutar){ msg.style.color="#f87171"; msg.textContent="⚠️ Lütfen tüm alanları doldurun."; return; }
      const liste=faturaYukle();
      liste.push({id:Date.now(),no,tarih,tutar,odendi:false});
      faturaKaydet(liste);
      document.getElementById("inp-no").value="";
      document.getElementById("inp-tarih").value="";
      document.getElementById("inp-tutar").value="";
      document.getElementById("vade-hint").style.display="none";
      msg.style.color="#4ade80"; msg.textContent="✅ Fatura eklendi!";
      setTimeout(()=>msg.textContent="",2500);
      listeyiGoster(); rozetGuncelle(); ozetGuncelle();
    }

    function faturasSil(id) { faturaKaydet(faturaYukle().filter(i=>i.id!==id)); listeyiGoster(); rozetGuncelle(); ozetGuncelle(); }

    function odendiBelirle(id,durum) {
      faturaKaydet(faturaYukle().map(i=>i.id===id?{...i,odendi:durum}:i));
      listeyiGoster(); rozetGuncelle(); ozetGuncelle();
    }

    // ── TABLO ──
    function listeyiGoster() {
      const liste=faturaYukle().sort((a,b)=>{
        if(a.odendi&&!b.odendi) return 1;
        if(!a.odendi&&b.odendi) return -1;
        return kalanGun(vadeTarihi(a.tarih))-kalanGun(vadeTarihi(b.tarih));
      });
      const baslik=document.getElementById("liste-baslik");
      const konteyner=document.getElementById("liste");
      if(!liste.length){
        baslik.textContent="";
        konteyner.innerHTML='<div class="bos">🗂️<br>Henüz fatura eklenmedi.<br><span style="font-size:13px;color:#334155">Yukarıdaki formu doldurun.</span></div>';
        return;
      }
      baslik.textContent=liste.length+" fatura · Vadeye göre sıralı";
      konteyner.innerHTML=`<div class="tablo-wrap"><table>
        <thead><tr>
          <th>#</th><th>FATURA NO</th><th>FATURA TARİHİ</th><th>VADE TARİHİ</th><th>TUTAR</th><th>DURUM</th><th>İŞLEM</th>
        </tr></thead>
        <tbody>${liste.map((inv,i)=>{
          const vade=vadeTarihi(inv.tarih),g=kalanGun(vade);
          const{label,renk,bg}=durumBilgi(g);
          const odendi=inv.odendi;
          return`<tr class="${odendi?'odendi-satir':''}">
            <td style="color:#64748b">${i+1}</td>
            <td><strong>${inv.no}</strong></td>
            <td style="color:#64748b">${formatTarih(new Date(inv.tarih))}</td>
            <td>${formatTarih(vade)}</td>
            <td class="tutar-hucre">${formatPara(inv.tutar)}</td>
            <td>${odendi
              ?'<span class="durum" style="color:#4ade80;background:#4ade8022">✅ Ödendi</span>'
              :`<span class="durum" style="color:${renk};background:${bg}">${label}</span>`
            }</td>
            <td><div class="islem-grup">
              ${odendi
                ?`<button class="btn-geri-al" onclick="odendiBelirle(${inv.id},false)">↩ Geri Al</button>`
                :`<button class="btn-odendi" onclick="odendiBelirle(${inv.id},true)">✅ Ödendi</button>`
              }
              <button class="btn-sil-tablo" onclick="faturasSil(${inv.id})">🗑️ Sil</button>
            </div></td>
          </tr>`;
        }).join("")}</tbody>
      </table></div>`;
    }

    firmaAdiniYukle();
    listeyiGoster();
    rozetGuncelle();
    ozetGuncelle();
    bildirimKontrol();
    setTimeout(uyariKontrol, 800);
    setInterval(()=>{ rozetGuncelle(); ozetGuncelle(); }, 60000);
  </script>
</body>
</html>
